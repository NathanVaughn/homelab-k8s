apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco-release
  namespace: falco
spec:
  releaseName: descheduler
  chart:
    spec:
      chart: falco
      sourceRef:
        kind: HelmRepository
        name: falco-repo
        namespace: falco
      version: "9.1.0"
  interval: 1h0m0s
  values:
    # registry-proxy block-start
    image:
      registry: cr.nathanv.app/docker.io
    driver:
      loader:
        initContainer:
          image:
            registry: cr.nathanv.app/docker.io
    falcoctl:
      image:
        registry: cr.nathanv.app/docker.io
    # registry-proxy block-end
    nodeSelector:
      role: apps
    # enable alertmanager
    falcosidekick:
      enabled: true
      # registry-proxy block-start
      image:
        registry: cr.nathanv.app/docker.io
      # registry-proxy block-end
      config:
        alertmanager:
          hostport: http://prometheus-kube-prometheus-alertmanager.prometheus.svc.cluster.internal:9093
          minimumpriority: "warning"
